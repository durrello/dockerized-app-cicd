services:
  app:
    build: .
    image: dockerized-app-cicd:local
    ports:
      - "8080:8080"
    environment:
      - APP_VERSION=local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 3s
      retries: 3
